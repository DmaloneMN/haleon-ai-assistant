name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep infrastructure
        run: |
          chmod +x infra/deploy.sh
          infra/deploy.sh \
            "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            "${{ vars.AZURE_LOCATION || 'uksouth' }}" \
            "${{ vars.RESOURCE_PREFIX || 'haleon' }}"
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_SEARCH_KEY: ${{ secrets.AZURE_SEARCH_KEY }}
          AZURE_CONTENT_SAFETY_KEY: ${{ secrets.AZURE_CONTENT_SAFETY_KEY }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}

  deploy-app:
    name: Build & Deploy Application
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ secrets.ACR_LOGIN_SERVER }}/haleon-assistant:${{ github.sha }}"
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v2
        with:
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppName: haleon-assistant
          imageToDeploy: ${{ env.IMAGE_TAG }}
          environmentVariables: |
            AZURE_OPENAI_ENDPOINT=secretref:azure-openai-endpoint
            AZURE_OPENAI_API_KEY=secretref:azure-openai-api-key
            AZURE_SEARCH_ENDPOINT=secretref:azure-search-endpoint
            AZURE_SEARCH_KEY=secretref:azure-search-key
