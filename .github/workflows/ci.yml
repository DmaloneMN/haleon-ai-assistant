name: CI
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install build & test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install -e .
          # Upgrade ruff to ensure format is available and consistent
          pip install -U ruff
          pip install pytest pytest-cov pytest-asyncio httpx autoflake

      - name: Lint (ruff) — run only on existing targets
        run: |
          echo "Running ruff lint checks..."
          TARGETS="src"
          if [ -d "tests" ]; then
            TARGETS="$TARGETS tests"
          fi
          echo "Linting targets: $TARGETS"
          # Use ruff check (no unsupported flags). Fail on issues.
          ruff check $TARGETS || (echo "Ruff lint failures detected. Run 'ruff format $TARGETS' and/or 'autoflake --in-place --remove-all-unused-imports -r $TARGETS' locally to fix automatically." && exit 1)

      - name: Auto-fix common lint issues (safe commands)
        if: ${{ always() }}
        run: |
          TARGETS="src"
          if [ -d "tests" ]; then
            TARGETS="$TARGETS tests"
          fi
          echo "Attempting auto-fixes on: $TARGETS"
          # Use the supported auto-format command (ruff format).
          ruff format $TARGETS || echo "ruff format failed or is not available; skipping format"
          # Remove unused imports using autoflake
          autoflake --in-place --remove-all-unused-imports -r $TARGETS || echo "autoflake failed or is not available; skipping unused-import removal"
          # Re-run the lint check to show remaining issues (non-fatal here)
          ruff check $TARGETS || true

      - name: Run tests (allow no-tests to be non-fatal)
        run: |
          set -o pipefail
          pytest --cov=src/haleon_assistant --cov-report=xml -v 2>&1 | tee pytest.log
          status=${PIPESTATUS[0]}
          if [ "$status" -eq 5 ]; then
            echo "No tests were collected by pytest (exit code 5). Treating this as success for CI."
            exit 0
          fi
          exit "$status"
        env:
          CI: true

      - name: Upload test logs & coverage
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            pytest.log
            coverage.xml
