name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install lint dependencies
        run: pip install ruff

      - name: Run ruff
        run: |
          echo "Running ruff lint checks..."
          ruff check src/ tests/ || {
            echo ""
            echo "Lint failures detected. To auto-fix unused imports locally, run:"
            echo "  ruff check --fix src/ tests/"
            exit 1
          }

  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('**/requirements.txt', '**/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install the project package in editable mode so tests can import haleon_assistant
          pip install -e .
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests
        run: |
          set -o pipefail
          pytest --cov=src/haleon_assistant --cov-report=xml -v 2>&1 | tee pytest.log

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            pytest.log
            coverage.xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true
